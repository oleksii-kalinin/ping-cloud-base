apiVersion: apps/v1
kind: Deployment
metadata:
  name: logging-bootstrap
  labels:
      role: logging-bootstrap
spec:
  replicas: 1
  template:
    metadata:
      name: logging-bootstrap
    spec:
      serviceAccountName: logging-bootstrap-serviceaccount
      securityContext:
        runAsGroup: 9999
        runAsNonRoot: true
        runAsUser: 9031
        fsGroup: 9999
      containers:
      - name: logging-bootstrap
        image: 705370621539.dkr.ecr.us-west-2.amazonaws.com/pingcloud-monitoring/logging-bootstrap:v1.14.0.0-pdo-4027-create-logging-bootstrap
        imagePullPolicy: Always
        env:
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: SERVICE_SSM_PATH_PREFIX
            value:
        resources:
          requests:
            memory: "256Mi"
            cpu: "300m"
          limits:
            memory: "512Mi"
            cpu: "500m"