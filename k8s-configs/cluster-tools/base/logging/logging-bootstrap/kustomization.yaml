kind: Kustomization
apiVersion: kustomize.config.k8s.io/v1beta1

namespace: elastic-stack-logging

commonLabels:
  app: logging-bootstrap
  role: bootstrap

generatorOptions:
  disableNameSuffixHash: true

resources:
  - rbac.yaml
  - deployment.yaml

configMapGenerator:
- name: logging-bootstrap-environment-variables
  envs:
    - env_vars